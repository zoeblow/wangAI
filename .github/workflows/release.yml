name: Release

on:
  push:
    tags:
      - "cli-v*"
      - "sync-v*"

jobs:
  publish-cli:
    if: startsWith(github.ref_name, 'cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify CLI help
        run: node ./bin/wangai.js --help --lang zh

      - name: Verify package payload (cli)
        run: npm pack --dry-run

      - name: Publish @wangai/cli to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-sync:
    if: startsWith(github.ref_name, 'sync-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: packages/sync
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify sync CLI
        run: npm run check

      - name: Verify package payload (sync)
        run: npm pack --dry-run

      - name: Publish @wangai/sync to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

