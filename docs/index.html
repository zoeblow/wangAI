<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WangAI Docs Hub</title>
  <meta name="description" content="WangAI monorepo docs hub for @wangai/cli and @wangai/sync">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #10b981;
      --accent2: #14b8a6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top right, rgba(16,185,129,.12), transparent 50%), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 64px 20px 80px;
    }
    .hero {
      text-align: center;
      margin-bottom: 40px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 5vw, 54px);
      line-height: 1.1;
    }
    .gradient {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sub {
      color: var(--muted);
      font-size: 18px;
      margin: 0;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 32px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 22px;
      transition: transform .2s, border-color .2s;
    }
    .card:hover {
      transform: translateY(-2px);
      border-color: #586069;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    .card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
    }
    .btn:hover {
      border-color: #8b949e;
    }
    .footer {
      margin-top: 42px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }
    code {
      background: rgba(16,185,129,.12);
      border: 1px solid rgba(16,185,129,.25);
      border-radius: 6px;
      padding: 1px 6px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1><span class="gradient">WangAI</span> Docs Hub</h1>
      <p class="sub">统一文档入口，按包导航到各自页面</p>
    </section>

    <section class="cards">
      <article class="card">
        <h2>@wangai/cli</h2>
        <p>AI 工作流初始化工具，负责在项目中生成 <code>.claude/.codex/.gemini</code> 等配置。</p>
        <a class="btn" href="./cli/index.html">进入文档</a>
      </article>

      <article class="card">
        <h2>@wangai/sync</h2>
        <p>跨助手同步工具，维护统一 baseline，并通过 WebDAV 在多机器间 push/pull。</p>
        <a class="btn" href="./sync/index.html">进入文档</a>
      </article>
    </section>

    <p class="footer">如果更新了子包文档，请执行 <code>npm run docs:sync</code> 同步到根 <code>/docs</code>。</p>
  </main>
</body>
</html>
